<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./src/output.css">
</head>
<body class="bg-[#f5f7fb] text-gray-700 font-sans">

  <!-- Navbar -->

  <header class="bg-white border-b">

    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

      <h1 class="text-lg font-semibold">Ujian Tengah Semester PIPL</h1>
      <h1 class="text-lg font-semibold">Ecommerce</h1>

    </div>

  </header>

  <!-- Main -->

  <main class="max-w-7xl mx-auto px-6 py-10">

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

      <!-- Left Content -->

      <div class="lg:col-span-2">

        <!-- Form -->

        <div class="bg-white border rounded-xl p-6">

          <h2 class="font-semibold mb-6">Informasi Pesanan</h2>

          <div class="grid md:grid-cols-2 gap-5">

            <div>

              <label class="text-sm mb-2 block">Nama Pelanggan</label>

              <input
                id="namaPelanggan"
                type="text"
                placeholder="Masukkan nama lengkap"
                class="w-full border rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500"
                autocomplete="off"
              />
              <p id="errorNama" class="text-red-500 text-xs mt-1 hidden"></p>

            </div>

            <div>

              <label class="text-sm mb-2 block">Total Belanja (Rp)</label>

              <input
                id="totalBelanja"
                type="text"
                inputmode="numeric"
                placeholder="Rp 200.000"
                class="w-full border rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500"
                autocomplete="off"
              />
              <p id="errorBelanja" class="text-red-500 text-xs mt-1 hidden"></p>

            </div>

            <div>

              <label class="text-sm mb-2 block">Jarak Pengiriman (km)</label>

              <input
                id="jarak"
                type="text"
                inputmode="decimal"
                placeholder="Contoh: 10"
                class="w-full border rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500"
                autocomplete="off"
              />
              <p id="errorJarak" class="text-red-500 text-xs mt-1 hidden"></p>

            </div>

          </div>

          <!-- Toggle -->

          <div class="grid md:grid-cols-2 gap-4 mt-6">

            <div class="border rounded-xl p-4 flex items-center justify-between bg-[#f7f9fc]">

              <div>

                <h3 class="font-medium">Status Member</h3>

                <p class="text-sm text-gray-500">

                  Aktifkan untuk diskon member

                </p>

              </div>

              <label class="relative inline-flex items-center cursor-pointer">

                <input type="checkbox" id="member" class="sr-only peer">

                <div class="w-11 h-6 bg-gray-300 rounded-full peer peer-checked:bg-blue-600 relative after:content-[''] after:absolute after:left-1 after:top-1 after:bg-white after:w-4 after:h-4 after:rounded-full after:transition-all peer-checked:after:translate-x-5"></div>

              </label>

            </div>

            <div class="border rounded-xl p-4 flex items-center justify-between bg-[#f7f9fc]">

              <div>

                <h3 class="font-medium">Gunakan Voucher</h3>

                <p class="text-sm text-gray-500">

                  Potongan biaya pengiriman

                </p>

              </div>

              <label class="relative inline-flex items-center cursor-pointer">

                <input type="checkbox" id="voucher" class="sr-only peer">

                <div class="w-11 h-6 bg-gray-300 rounded-full peer peer-checked:bg-blue-600 relative after:content-[''] after:absolute after:left-1 after:top-1 after:bg-white after:w-4 after:h-4 after:rounded-full after:transition-all peer-checked:after:translate-x-5"></div>

              </label>

            </div>

          </div>

        </div>

      </div>

      <!-- Right Content - Summary -->

      <div>

        <div class="bg-[#eef3ff] border rounded-2xl p-6 sticky top-6">

          <h2 class="font-semibold mb-6">Ringkasan Pesanan</h2>

          <div class="space-y-4 text-sm">

            <div class="flex justify-between">

              <span>Subtotal</span>

              <span id="subtotalText">Rp 0</span>

            </div>

            <div class="flex justify-between">

              <span>Biaya Pengiriman</span>

              <span id="shippingText">Rp 0</span>

            </div>

            <div class="flex justify-between text-green-500">

              <span>Diskon Member</span>

              <span id="memberDiscount">- Rp 0</span>

            </div>

            <div class="flex justify-between text-green-500">

              <span>Voucher Potongan</span>

              <span id="voucherDiscount">- Rp 0</span>

            </div>

            <hr>

            <div class="flex justify-between font-semibold text-base">

              <span>Total Tagihan</span>

              <span id="totalText">Rp 0</span>

            </div>

          </div>

          <button class="w-full bg-blue-600 hover:bg-blue-700 transition text-white py-3 rounded-xl mt-5 font-medium">

            Konfirmasi Pesanan →

          </button>

        </div>

      </div>

    </div>

  <script>

    let shippingCost = 0;
    const namaPelanggan = document.getElementById("namaPelanggan");
    const errorNama = document.getElementById("errorNama");
    const totalBelanja = document.getElementById("totalBelanja");
    const member = document.getElementById("member");
    const voucher = document.getElementById("voucher");
    const jarak = document.getElementById("jarak");
    const errorJarak = document.getElementById("errorJarak");

    // Helper: format angka dengan titik ribuan
    function formatAngkaRupiah(val) {
      return val.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    }

    // Helper: hapus semua karakter kecuali angka
    function onlyNumber(val) {
      return val.replace(/[^\d]/g, "");
    }

    function validateNama() {
      const nama = namaPelanggan.value;
      // Tidak boleh null atau hanya spasi
      if (!nama || nama.trim().length === 0) {
        errorNama.innerText = "Nama wajib diisi dan tidak boleh hanya spasi";
        errorNama.classList.remove("hidden");
        return false;
      }
      // Minimal 3 karakter
      if (nama.trim().length < 3) {
        errorNama.innerText = "Nama minimal 3 karakter";
        errorNama.classList.remove("hidden");
        return false;
      }
      // Maksimal 50 karakter
      if (nama.trim().length > 50) {
        errorNama.innerText = "Nama maksimal 50 karakter";
        errorNama.classList.remove("hidden");
        return false;
      }
      // Tidak boleh mengandung angka
      if (/\d/.test(nama)) {
        errorNama.innerText = "Nama tidak boleh mengandung angka";
        errorNama.classList.remove("hidden");
        return false;
      }
      // Tidak boleh simbol/karakter aneh
      if (/[^a-zA-Z\s'.-]/.test(nama)) {
        errorNama.innerText = "Nama tidak boleh mengandung simbol atau karakter aneh";
        errorNama.classList.remove("hidden");
        return false;
      }
      // Cegah SQL Injection / Script sederhana
      const lower = nama.toLowerCase();
      if (lower.includes("select ") || lower.includes("insert ") || lower.includes("update ") || lower.includes("delete ") || lower.includes("drop ") || lower.includes("--") || lower.includes("<script")) {
        errorNama.innerText = "Nama tidak boleh mengandung kata atau karakter berbahaya";
        errorNama.classList.remove("hidden");
        return false;
      }
      errorNama.innerText = "";
      errorNama.classList.add("hidden");
      return true;
    }

    function validateBelanja() {
      let val = totalBelanja.value;
      // Tidak boleh kosong
      if (!val || val.trim().length === 0) {
        errorBelanja.innerText = "Total belanja wajib diisi";
        errorBelanja.classList.remove("hidden");
        return false;
      }
      // Tidak boleh huruf, simbol, karakter aneh
      if (/[^\d.]/.test(val)) {
        errorBelanja.innerText = "Total belanja hanya boleh angka";
        errorBelanja.classList.remove("hidden");
        return false;
      }
      // Tidak boleh format salah (misal 10,00,00 atau 1..000)
      if (/\d+,\d+,/.test(val) || /\.\./.test(val)) {
        errorBelanja.innerText = "Format angka tidak sesuai";
        errorBelanja.classList.remove("hidden");
        return false;
      }
      // Hapus titik/karakter selain angka untuk validasi nilai
      let angka = onlyNumber(val);
      if (angka.length === 0) {
        errorBelanja.innerText = "Total belanja wajib diisi";
        errorBelanja.classList.remove("hidden");
        return false;
      }
      let nominal = parseInt(angka);
      // Tidak boleh minus
      if (nominal < 0) {
        errorBelanja.innerText = "Total belanja tidak boleh minus";
        errorBelanja.classList.remove("hidden");
        return false;
      }
      // Tidak boleh 0
      if (nominal === 0) {
        errorBelanja.innerText = "Total belanja harus lebih dari 0";
        errorBelanja.classList.remove("hidden");
        return false;
      }
      // Maksimal Rp999.999.999
      // if (nominal > 999999999) {
      //   errorBelanja.innerText = "Total belanja maksimal Rp999.999.999";
      //   errorBelanja.classList.remove("hidden");
      //   return false;
      // }
      errorBelanja.innerText = "";
      errorBelanja.classList.add("hidden");
      return true;
    }

    function validateJarak() {
      let val = jarak.value;
      // Tidak boleh kosong
      if (!val || val.trim().length === 0) {
        errorJarak.innerText = "Jarak wajib diisi";
        errorJarak.classList.remove("hidden");
        return false;
      }
      // Tidak boleh huruf, simbol, karakter aneh
      if (/[^\d.]/.test(val)) {
        errorJarak.innerText = "Jarak hanya boleh angka atau desimal";
        errorJarak.classList.remove("hidden");
        return false;
      }
      // Tidak boleh format salah (misal 10..5 atau 1,2,3)
      if (/\.\./.test(val) || /,/.test(val)) {
        errorJarak.innerText = "Format angka tidak sesuai";
        errorJarak.classList.remove("hidden");
        return false;
      }
      // Hapus titik di depan/belakang
      let angka = val.replace(/^\.|\.$/g, "");
      if (angka.length === 0) {
        errorJarak.innerText = "Jarak wajib diisi";
        errorJarak.classList.remove("hidden");
        return false;
      }
      let nominal = parseFloat(angka);
      // Tidak boleh minus
      if (nominal < 0) {
        errorJarak.innerText = "Jarak tidak boleh negatif";
        errorJarak.classList.remove("hidden");
        return false;
      }
      // Tidak boleh 0
      if (nominal === 0) {
        errorJarak.innerText = "Jarak harus lebih dari 0";
        errorJarak.classList.remove("hidden");
        return false;
      }
      // Maksimal 100 km
      if (nominal > 200) {
        errorJarak.innerText = "Jarak maksimal 100 km";
        errorJarak.classList.remove("hidden");
        return false;
      }
      errorJarak.innerText = "";
      errorJarak.classList.add("hidden");
      return true;
    }

    namaPelanggan.addEventListener("input", validateNama);

    // Auto-format angka saat input
    totalBelanja.addEventListener("input", function(e) {
      let val = totalBelanja.value;
      // Hapus semua karakter kecuali angka
      let angka = onlyNumber(val);
      if (angka.length > 0) {
        totalBelanja.value = formatAngkaRupiah(angka);
      } else {
        totalBelanja.value = "";
      }
      validateBelanja();
      updateSummary();
    });

    function updateSummary() {

      let subtotal = parseInt(totalBelanja.value) || 0;

      let memberDiscount = member.checked ? subtotal * 0.1 : 0;

      let voucherDiscount = voucher.checked ? 10000 : 0;

      let total =

        subtotal +

        shippingCost -

        memberDiscount -

        voucherDiscount;

      document.getElementById("subtotalText").innerText =

        formatRupiah(subtotal);

      document.getElementById("shippingText").innerText =

        formatRupiah(shippingCost);

      document.getElementById("memberDiscount").innerText =

        "- " + formatRupiah(memberDiscount);

      document.getElementById("voucherDiscount").innerText =

        "- " + formatRupiah(voucherDiscount);

      document.getElementById("totalText").innerText =

        formatRupiah(total);

    }

    totalBelanja.addEventListener("input", updateSummary);

    member.addEventListener("change", updateSummary);

    voucher.addEventListener("change", updateSummary);

    updateSummary();

  </script>

</body>

</html>
